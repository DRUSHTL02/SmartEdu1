<!DOCTYPE html>
<html>
<head>
    <title>Select Class - SmartEdu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h1>Select Your Class</h1>
    <p>Choose your academic level</p>

    <div class="row mt-4 justify-content-center">

        <div class="col-10 col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card p-3 h-100" onclick="selectClass('1-5')">
                <h4>Primary</h4>
                <p>1st - 5th</p>
            </div>
        </div>

        <div class="col-10 col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card p-3 h-100" onclick="selectClass('6-8')">
                <h4>Middle</h4>
                <p>6th - 8th</p>
            </div>
        </div>

        <div class="col-10 col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card p-3 h-100" onclick="selectClass('9-10')">
                <h4>Secondary</h4>
                <p>9th - 10th</p>
            </div>
        </div>

        <div class="col-10 col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card p-3 h-100" onclick="selectClass('11-12')">
                <h4>Senior Secondary</h4>
                <p>11th - 12th</p>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

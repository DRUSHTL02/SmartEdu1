<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Series - SmartEdu</title>
    <link rel="stylesheet" href="tests.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="test-navbar">
    <div class="nav-left">
        <i class="fa-solid fa-arrow-left" id="backDash"></i>
        <i class="fa-solid fa-graduation-cap"></i>
        <span>SmartEdu</span>
    </div>
</nav>

<div class="test-container">

    <h1>Test Series</h1>
    <p class="sub">Practice tests and assessments</p>

    <div id="testGrid" class="test-grid"></div>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="empty-card" style="display:none;">
        <i class="fa-solid fa-trophy"></i>
        <h3>No tests available</h3>
        <p>Check back later for new assessments</p>
    </div>

</div>

<script src="tests.js"></script>
</body>
</html>

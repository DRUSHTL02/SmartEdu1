<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Subjects - SmartEdu</title>

<link rel="stylesheet" href="enroll.css">
<link rel="stylesheet" href="subjects.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<nav class="enroll-navbar">
<div class="nav-left">
<i class="fa-solid fa-arrow-left back-arrow"></i>
<i class="fa-solid fa-graduation-cap"></i>
<span>SmartEdu</span>
</div>
</nav>

<div class="enroll-container">

<h1>Enroll in a Course</h1>
<p class="sub">Select your class, board, and subjects</p>

<div class="step-bar">
<div class="step active">1</div>
<div class="line active"></div>
<div class="step active">2</div>
<div class="line active"></div>
<div class="step active">3</div>
<div class="line"></div>
<div class="step">4</div>
</div>

<h2>Select Subjects</h2>

<div class="subject-grid" id="subjectGrid"></div>

<div class="bottom-wrap">
<button class="back-btn">Back</button>
<button class="next-btn" disabled>Next</button>
</div>

</div>

<script src="subjects.js"></script>
</body>
</html>
